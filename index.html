<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For you ❤️</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}

/* ENTRADA */
#start {
    position: fixed;
    top: 40%;
    width: 100%;
    z-index: 3;
}

/* CONTENIDO */
#content {
    display: none;
    opacity: 0;
    transition: opacity 1.5s ease;
}

img {
    width: 85%;
    max-width: 320px;
    border-radius: 20px;
    margin-top: 40px;
    box-shadow: 0 0 25px rgba(255,255,255,0.2);
}

/* BOTÓN */
#revealBtn {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 25px;
    border: 1px solid white;
    background: rgba(0,0,0,0.6);
    color: white;
    border-radius: 10px;
    z-index: 5;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% {transform: translateX(-50%) scale(1);}
    50% {transform: translateX(-50%) scale(1.1);}
    100% {transform: translateX(-50%) scale(1);}
}

/* TEXTO */
#text {
    display: none;
    margin-top: 30px;
    font-size: 22px;
    width: 90%;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.6;
    padding-bottom: 120px;
}

/* ESCENA FINAL */
#scene2 {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    justify-content: center;
    align-items: center;
    font-size: 32px;
    animation: fadeInScene 3s ease forwards;
}

#scene2 h2 {
    animation: glow 2s ease infinite alternate;
}

@keyframes fadeInScene {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes glow {
    from {text-shadow: 0 0 5px white;}
    to {text-shadow: 0 0 25px white;}
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div id="start">
    <p>✨ Ingresa el código ✨</p>
    <input type="password" id="pass">
    <br><br>
    <button onclick="checkPass()">Entrar</button>
    <p id="error"></p>
</div>

<div id="content">
    <img src="foto.jpg">
    <button id="revealBtn" onclick="showText()">Presiona aquí ❤️</button>
    <div id="text"></div>
</div>

<div id="scene2">
    <h2>I Love you Sweeti 👩🏻‍🚀</h2>
</div>

<audio id="music" loop>
    <source src="musica.mp3" type="audio/mp3">
</audio>

<script>

// PASSWORD
function checkPass(){
    if(document.getElementById("pass").value === "2303"){
        document.getElementById("start").style.display = "none";

        let content = document.getElementById("content");
        content.style.display = "block";

        setTimeout(()=> content.style.opacity = "1", 50);

        if(navigator.vibrate){
            navigator.vibrate(100);
        }

    } else {
        document.getElementById("error").innerText = "Código incorrecto...";
    }
}

// TEXTO ANIMADO + AUDIO
function showText(){
    document.getElementById("revealBtn").style.display = "none";
    document.getElementById("text").style.display = "block";

    const audio = document.getElementById("music");
    audio.play();

    const lines = [
        "Eres la calma que rompe mi guerra...",
        "La herida dulce que no quiero cerrar...",
        "Me pierdo en tu voz como en otra tierra…",
        "donde amar también duele… y aun así quiero quedar...",
        "Eres fuego y hielo en la misma piel...",
        "Mi paz y mi caos en una canción...",
        "Y aunque amarte a veces no me haga bien...",
        "prefiero tu tormenta… que un mundo sin tu voz...",
        "Happy birthday Sweetii 👩🏻‍🚀❤️"
    ];

    let i = 0;
    const textContainer = document.getElementById("text");

    function showLine(){
        if(i < lines.length){
            const p = document.createElement("p");
            p.style.opacity = "0";
            p.innerHTML = lines[i];
            textContainer.appendChild(p);

            setTimeout(()=>{
                p.style.transition = "opacity 1.5s";
                p.style.opacity = "1";
            },100);

            i++;
            setTimeout(showLine, 2500);
        } else {
            setTimeout(()=>{
                document.getElementById("scene2").style.display = "flex";
            }, 2500);
        }
    }

    showLine();
}

// ESTRELLAS
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let stars = [];

for(let i=0;i<120;i++){
    stars.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*2,
        speed: 0.3 + Math.random()*0.5
    });
}

function drawStars(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    stars.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle = "white";
        ctx.fill();

        s.y += s.speed;

        if(s.y > canvas.height){
            s.y = -5;
            s.x = Math.random()*canvas.width;
        }
    });

    requestAnimationFrame(drawStars);
}

drawStars();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For you ❤️</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    overflow:hidden;
}

#start{
    position:fixed;
    top:40%;
    width:100%;
}

#content{
    display:none;
    opacity:0;
    transition:opacity 1.5s ease;
}

#mainImage{
    width:85%;
    max-width:320px;
    border-radius:20px;
    margin-top:40px;
    transition:transform 12s ease-out;
}
.zoom{ transform:scale(1.15); }
.beat{ transform:scale(1.2); }

#text{
    display:none;
    margin-top:30px;
    font-size:22px;
    width:90%;
    margin:auto;
    line-height:1.7;
    padding-bottom:200px;
}

#scene2{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    justify-content:center;
    align-items:center;
    font-size:32px;
}

canvas{
    position:fixed;
    top:0;
    left:0;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div id="start">
    <p>✨ Ingresa los 4 digitos ✨</p>
    <input type="password" id="pass">
    <br><br>
    <button onclick="checkPass()">Entrar</button>
</div>

<div id="content">
    <img id="mainImage" src="foto.jpg">
    <div id="text"></div>
</div>

<div id="scene2">
    <h2>I Love you Sweetii 👩🏻‍🚀🐾</h2>
</div>

<audio id="music" loop>
    <source src="musica.mp3">
</audio>

<script>

const CORO_TIME = 42;

// PASSWORD
function checkPass(){
    if(document.getElementById("pass").value==="2303"){
        document.getElementById("start").style.display="none";
        let c=document.getElementById("content");
        c.style.display="block";
        setTimeout(()=>c.style.opacity="1",50);
        startExperience();
    }
}

// START
function startExperience(){
    const audio=document.getElementById("music");
    audio.currentTime = CORO_TIME - 10;
    audio.play();

    document.getElementById("mainImage").classList.add("zoom");

    startText();
}

// TEXTO + SCROLL LENTO
function startText(){
    const lines=[
        "Eres la tranquilidad que rompe mi guerra...",
        "La herida agridulce que no quiero cerrar...",
        "Me pierdo en tu risa como en otra orbita…",
        "donde amar también duele… y aun así me quiero quedar...",
        "Eres fuego y hielo en la misma piel...",
        "Mi paz y mi caos en una canción...",
        "Y aunque amarte a veces no me haga bien...",
        "prefiero tu tormenta… que un mundo sin tu voz..."
    ];

    let i=0;
    const container=document.getElementById("text");
    container.style.display="block";

    function show(){
        if(i<lines.length){
            let p=document.createElement("p");
            p.style.opacity=0;
            p.innerHTML=lines[i];
            container.appendChild(p);

            setTimeout(()=>{
                p.style.transition="opacity 2s ease";
                p.style.opacity=1;
            },200);

            // 📜 scroll suave automático
            window.scrollBy({
                top: 60,
                behavior: "smooth"
            });

            i++;
            setTimeout(show, 3000); // ⏳ MÁS TIEMPO ENTRE LÍNEAS
        } else {
            setTimeout(()=>{
                document.getElementById("scene2").style.display="flex";
            }, 4000); // ⏳ pausa antes del final
        }
    }

    show();
}

// ESTRELLAS
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<100;i++){
    stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height});
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s=>{
        ctx.fillStyle="white";
        ctx.fillRect(s.x,s.y,2,2);
        s.y+=0.5;
        if(s.y>canvas.height)s.y=0;
    });
    requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>

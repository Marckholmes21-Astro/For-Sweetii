<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For you ❤️</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    overflow:hidden;
}

/* ENTRADA */
#start{
    position:fixed;
    top:40%;
    width:100%;
    z-index:10;
}

/* SHAKE ERROR */
.shake{
    animation:shake 0.3s;
}
@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    50%{transform:translateX(5px);}
    75%{transform:translateX(-5px);}
    100%{transform:translateX(0);}
}

/* CONTENIDO */
#content{
    display:none;
    opacity:0;
    transition:opacity 1.5s ease;
}

/* IMAGEN */
#mainImage{
    width:85%;
    max-width:320px;
    border-radius:20px;
    margin-top:40px;
    box-shadow:0 0 25px rgba(255,255,255,0.2);
    transition:transform 12s ease-out;
}
.zoom{ transform:scale(1.15); }
.beat{ transform:scale(1.2); box-shadow:0 0 40px white; }

/* TEXTO */
#text{
    display:none;
    margin-top:30px;
    font-size:22px;
    width:90%;
    margin:auto;
    line-height:1.6;
}

/* FINAL */
#scene2{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    justify-content:center;
    align-items:center;
    font-size:32px;
}
#scene2 h2{
    animation:glow 2s infinite alternate;
}
@keyframes glow{
    from{text-shadow:0 0 5px white;}
    to{text-shadow:0 0 40px white;}
}

/* CANVAS */
canvas{
    position:fixed;
    top:0;
    left:0;
    pointer-events:none;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>
<canvas id="hearts"></canvas>

<div id="start">
    <p>✨ Ingresa el código ✨</p>
    <input type="password" id="pass">
    <br><br>
    <button onclick="checkPass()">Entrar</button>
    <p id="error"></p>
</div>

<div id="content">
    <img id="mainImage" src="foto.jpg">
    <div id="text"></div>
</div>

<div id="scene2">
    <h2>I Love you Sweeti 👩🏻‍🚀</h2>
</div>

<audio id="music" loop>
    <source src="musica.mp3" type="audio/mp3">
</audio>

<script>

// CONFIG
const CORO_TIME = 42;

// AUDIO
let audioCtx, analyser, dataArray;

function setupAudio(audio){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaElementSource(audio);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 64;
    src.connect(analyser);
    analyser.connect(audioCtx.destination);
    dataArray = new Uint8Array(analyser.frequencyBinCount);
}

function getLevel(){
    if(!analyser) return 0;
    analyser.getByteFrequencyData(dataArray);
    return dataArray.reduce((a,b)=>a+b)/dataArray.length/255;
}

// PASSWORD
function checkPass(){
    const input=document.getElementById("pass");
    if(input.value==="2303"){
        document.getElementById("start").style.display="none";
        let c=document.getElementById("content");
        c.style.display="block";
        setTimeout(()=>c.style.opacity="1",50);
        startExperience();
    }else{
        input.classList.add("shake");
        setTimeout(()=>input.classList.remove("shake"),300);
    }
}

// START
function startExperience(){
    const audio=document.getElementById("music");
    audio.currentTime=CORO_TIME-8;
    audio.play();
    setupAudio(audio);

    const img=document.getElementById("mainImage");
    img.classList.add("zoom");

    startText();
}

// TEXTO
function startText(){
    const lines=[
        "Eres la calma que rompe mi guerra...",
        "La herida dulce que no quiero cerrar...",
        "Me pierdo en tu voz como en otra tierra…",
        "donde amar también duele… y aun así quiero quedar...",
        "Eres fuego y hielo en la misma piel...",
        "Mi paz y mi caos en una canción...",
        "Y aunque amarte a veces no me haga bien...",
        "prefiero tu tormenta… que un mundo sin tu voz..."
    ];

    let i=0;
    const container=document.getElementById("text");
    container.style.display="block";

    function show(){
        if(i<lines.length){
            let p=document.createElement("p");
            p.style.opacity=0;
            p.innerHTML=lines[i];
            container.appendChild(p);

            setTimeout(()=>{
                p.style.transition="opacity 1.5s";
                p.style.opacity=1;
            },100);

            i++;
            setTimeout(show,2000);
        }else{
            setTimeout(()=>{
                document.getElementById("scene2").style.display="flex";
                spawnHearts();
            },2000);
        }
    }
    show();
}

// PARALLAX (movimiento suave con dedo)
document.addEventListener("mousemove",e=>{
    const img=document.getElementById("mainImage");
    let x=(e.clientX/window.innerWidth-0.5)*10;
    let y=(e.clientY/window.innerHeight-0.5)*10;
    img.style.transform=`scale(1.15) translate(${x}px,${y}px)`;
});

// ESTRELLAS
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
let stars=[];

function resize(){
    canvas.width=innerWidth;
    canvas.height=innerHeight;
}
resize();
window.addEventListener("resize",resize);

for(let i=0;i<120;i++){
    stars.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*2});
}

function drawStars(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let level=getLevel();

    stars.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r+level*3,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();
        s.y+=0.5+level*2;
        if(s.y>innerHeight){s.y=0;s.x=Math.random()*innerWidth;}
    });

    // latido
    if(level>0.25){
        document.getElementById("mainImage").classList.add("beat");
    }else{
        document.getElementById("mainImage").classList.remove("beat");
    }

    requestAnimationFrame(drawStars);
}
drawStars();

// CORAZONES
const heartsCanvas=document.getElementById("hearts");
const hctx=heartsCanvas.getContext("2d");
let hearts=[];

function spawnHearts(){
    for(let i=0;i<40;i++){
        hearts.push({x:Math.random()*innerWidth,y:innerHeight,size:10+Math.random()*10});
    }
}

function drawHearts(){
    hctx.clearRect(0,0,innerWidth,innerHeight);
    hearts.forEach(h=>{
        hctx.fillStyle="red";
        hctx.beginPath();
        hctx.arc(h.x,h.y,h.size,0,Math.PI*2);
        hctx.fill();
        h.y-=2;
    });
    requestAnimationFrame(drawHearts);
}
drawHearts();

</script>

</body>
</html>
